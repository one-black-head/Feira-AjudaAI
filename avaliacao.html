
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar Usuário - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css"> 
    <link rel="stylesheet" href="css/avaliacao.css">
</head>
<body>
    <div class="evaluation-card">
        <a href="javascript:history.back()" class="back-btn-modern" style="position: absolute; top: 1.5rem; left: 1.5rem;">← Voltar</a>
        
        <div id="evaluation-content">
            <h2>Avalie o Usuário</h2>
            <p>Deixe sua avaliação para <strong id="user-name">...</strong></p>
            
            <form id="evaluation-form">
                <div class="star-rating">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <input type="hidden" name="rating" id="rating-value" value="0">
                <div class="criteria-grid" style="display: none;">
                    <div class="form-group">
                        <label for="rating-quality">Qualidade</label>
                        <select id="rating-quality">
                            <option value="">Selecione</option>
                            <option value="5">5 - Excelente</option>
                            <option value="4">4 - Muito bom</option>
                            <option value="3">3 - Bom</option>
                            <option value="2">2 - Regular</option>
                            <option value="1">1 - Ruim</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="rating-deadline">Prazo</label>
                        <select id="rating-deadline">
                            <option value="">Selecione</option>
                            <option value="5">5 - Excelente</option>
                            <option value="4">4 - Muito bom</option>
                            <option value="3">3 - Bom</option>
                            <option value="2">2 - Regular</option>
                            <option value="1">1 - Ruim</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="rating-service">Atendimento</label>
                        <select id="rating-service">
                            <option value="">Selecione</option>
                            <option value="5">5 - Excelente</option>
                            <option value="4">4 - Muito bom</option>
                            <option value="3">3 - Bom</option>
                            <option value="2">2 - Regular</option>
                            <option value="1">1 - Ruim</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <textarea id="comment" rows="5" placeholder="Como foi sua experiência?"></textarea>
                </div>

                <button type="submit" class="btn btn-solid" id="submit-evaluation-btn">Enviar Avaliação</button>
            </form>
        </div>

        <div id="thank-you-message" style="display: none; text-align: center; padding: 2rem 0;">
            <h2>Obrigado!</h2>
            <p>Sua avaliação foi enviada com sucesso e ajuda a tornar nossa comunidade mais forte.</p>
            <a href="" id="back-to-profile-link" class="btn btn-outline">Voltar ao Perfil</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-check.js"></script>
    <script src="js/avaliacao.js"></script>
</body>
</html>
