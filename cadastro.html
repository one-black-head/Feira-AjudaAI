<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <style>
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #333;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">Voltar</a>

    <div class="auth-card">
        <div class="header">
            <a href="index.html" class="logo"><img src="image-removebg-preview.png" alt=""></a>
            <h2>Crie sua conta</h2>
            <p>Escolha como deseja interagir na plataforma</p>
        </div>

        <div class="type-selector">
            <div id="btn-ajudar" class="type-option active" onclick="selectType('ajudar')">Quero Ajudar</div>
            <div id="btn-contratar" class="type-option" onclick="selectType('contratar')">Quero Contratar</div>
        </div>

        <form id="cadastroForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: Maria Oliveira" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>

                <div class="form-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>

                <div class="form-group full-width">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div id="campos-ajudante" class="full-width">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                        </div>
                        <div class="form-group">
                            <label for="categoria">Sua Especialidade</label>
                            <select id="categoria">
                                <option value="">Selecione...</option>
                                <option value="diarista">Diarista / Limpeza</option>
                                <option value="reparos">Reparos / Manutenção</option>
                                <option value="tecnico">Técnico em Informática</option>
                                <option value="outros">Outros</option>
                            </select>
                        </div>
                        <div class="form-group full-width" id="campo-outra-categoria" style="display: none;">
                            <label for="outra-categoria">Especifique sua especialidade</label>
                            <input type="text" id="outra-categoria" placeholder="Digite sua profissão...">
                        </div>

                        <div class="form-group full-width">
                            <label for="profile-pic">Foto de Perfil</label>
                            <input type="file" id="profile-pic" accept="image/*">
                            <small>Formatos: JPG ou PNG. Preferência 1:1.</small>
                        </div>

                        <div class="form-group full-width">
                            <label for="resume">Currículo Profissional (PDF)</label>
                            <input type="file" id="resume" accept=".pdf">
                        </div>

                        <div class="form-group full-width">
                            <label for="certifications">Certificados/Cursos</label>
                            <input type="file" id="certifications" accept="image/*,.pdf" multiple>
                            <span class="helper-text">Pode selecionar vários arquivos de uma vez.</span>
                        </div>

                        <div class="form-group full-width">
                            <label for="bio">Resumo Profissional (Bio)</label>
                            <textarea id="bio" placeholder="Conte um pouco sobre sua experiência..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="senha">Crie uma Senha</label>
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Finalizar Cadastro</button>
        </form>

        <div class="footer">
            Já tem uma conta? <a href="login.html">Faça Login</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        // Mostrar/Esconder campo "Outros" na Especialidade
        document.getElementById('categoria').addEventListener('change', function() {
            const campoOutros = document.getElementById('campo-outra-categoria');
            const inputOutros = document.getElementById('outra-categoria');
            
            if (this.value === 'outros') {
                campoOutros.style.display = 'block';
                inputOutros.required = true; // Torna obrigatório se aparecer
            } else {
                campoOutros.style.display = 'none';
                inputOutros.required = false;
                inputOutros.value = ''; // Limpa o campo se o usuário mudar de ideia
            }
        });
        function selectType(tipo) {
            const btnAjudar = document.getElementById('btn-ajudar');
            const btnContratar = document.getElementById('btn-contratar');
            const camposAjudante = document.getElementById('campos-ajudante');
            
            if (tipo === 'ajudar') {
                btnAjudar.classList.add('active');
                btnContratar.classList.remove('active');
                camposAjudante.style.display = 'block';
                document.getElementById('cep').required = true;
                document.getElementById('categoria').required = true;
            } else {
                btnContratar.classList.add('active');
                btnAjudar.classList.remove('active');
                camposAjudante.style.display = 'none';
                document.getElementById('cep').required = false;
                document.getElementById('categoria').required = false;
            }
        }

        // Máscaras permanecem iguais
        document.getElementById('whatsapp').addEventListener('input', function(e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        document.getElementById('cpf').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });

        document.getElementById('cep').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });

        document.getElementById('cadastroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const auth = firebase.auth();
            const db = firebase.firestore();

            const userTypeOption = document.querySelector('.type-option.active').id;
            const userType = userTypeOption === 'btn-ajudar' ? 'trabalhador' : 'cliente';
            
            const name = document.getElementById('nome').value;
            const cpf = document.getElementById('cpf').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            
            const cep = document.getElementById('cep').value;
            let categoria = document.getElementById('categoria').value;
            if (categoria === 'outros') {
                categoria = document.getElementById('outra-categoria').value;
            }
            const bio = document.getElementById('bio').value;

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                const userData = {
                    name: name,
                    cpf: cpf,
                    whatsapp: whatsapp,
                    email: email,
                    userType: userType,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (userType === 'trabalhador') {
                    userData.cep = cep;
                    userData.profissao = categoria;
                    userData.resumo_profissao = bio;
                }

                await db.collection('users').doc(user.uid).set(userData);

                alert('Sucesso!\nSeu cadastro foi realizado.\n\nBem-vindo(a) ao AjudaAí!');
                window.location.href = 'dashboard.html';

            } catch (error) {
                console.error("Erro no cadastro: ", error);
                let message = "Ocorreu um erro ao realizar o cadastro. Por favor, tente novamente.";
                if (error.code === 'auth/email-already-in-use') {
                    message = "Este e-mail já está em uso. Por favor, utilize outro e-mail ou faça login.";
                } else if (error.code === 'auth/weak-password') {
                    message = "A senha é muito fraca. Ela deve ter no mínimo 6 caracteres.";
                }
                alert("Erro: " + message);
            }
        });
    </script>
</body>
</html>
