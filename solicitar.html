
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Serviço - AjudaAí</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/solicitar.css">
    <link rel="icon" href="image-removebg-preview.png" type="image/png">
</head>
<body>
    <header>
        <a href="index.html" class="logo"> <img src="image-removebg-preview.png" alt="Logo AjudaAí"> <h1>AjudaAI</h1> </a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Quem somos?</a></li>
                <li><a href="busca.html">Profissionais</a></li>
            </ul>
        </nav>
        <div class="header-actions" id="header-actions">
            <!-- Botões serão inseridos pelo auth-check.js -->
        </div>
    </header>

    <main class="container solicitar-main">
        <section class="solicitar-shell">
            <div class="solicitar-hero">
                <h1 class="form-title">Solicitar Serviço</h1>
                <p id="worker-name-display">Solicitando serviço para: Carregando...</p>
            </div>
            <form id="solicitar-form">
                <div class="form-group">
                    <label for="descricao">Descrição do Serviço</label>
                    <textarea id="descricao" name="descricao" rows="4" required placeholder="Ex: Instalar duas prateleiras na parede da sala."></textarea>
                </div>
                <div class="form-group">
                    <label for="valor">Valor Combinado (R$)</label>
                    <input type="number" id="valor" name="valor" step="0.01" min="0" required placeholder="50,00">
                </div>
                <div class="form-group">
                    <label for="data-conclusao">Data de Realização/Conclusão</label>
                    <input type="date" id="data-conclusao" name="data-conclusao" required>
                </div>

                <button type="submit" class="btn-submit-insano">Confirmar e Registrar Serviço</button>
            </form>
            <div id="form-message"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AjudaAí. Todos os direitos reservados.</p>
    </footer>

    <!-- Scripts do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>

    <!-- Scripts da Aplicação -->
    <script src="js/auth-check.js"></script>
    <script src="js/solicitar-script.js"></script>
</body>
</html>
