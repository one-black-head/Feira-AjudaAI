
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="icon" href="image-removebg-preview.png" type="image/png">
</head>
<body>

    <header>
        <a href="index.html" class="logo"> <img src="image-removebg-preview.png" alt="Logo AjudaAí"> <h1>AjudaAI</h1> </a>
        <nav> <ul> <li><a href="index.html">Início</a></li> <li><a href="sobre.html">Quem somos?</a></li> <li><a href="busca.html">Profissionais</a></li> <li><a href="chat.html">Chat</a></li> </ul> </nav>
        <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="chat-container">
        <div class="conversations-sidebar">
            <div class="sidebar-header">
                <h2>Conversas</h2>
            </div>
            <div id="conversations-list" class="conversations-list">
                <p class="loading-text">Carregando conversas...</p>
            </div>
        </div>

        <div class="chat-main">
            <div id="chat-welcome-screen" class="chat-window">
                <div class="welcome-message">
                    <h3>Bem-vindo ao seu chat</h3>
                    <p>Selecione uma conversa ao lado para começar a conversar.</p>
                </div>
            </div>

            <div id="chat-window" class="chat-window" style="display: none;">
                <div id="chat-header" class="chat-header">
                    <!-- O cabeçalho do chat será preenchido dinamicamente -->
                </div>
                <div id="messages-container" class="messages-container">
                    <!-- As mensagens serão carregadas aqui -->
                </div>
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Digite sua mensagem...">
                    <button id="send-button">Enviar</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-check.js"></script>
    <script>
        const db = firebase.firestore();
        let currentUserId = null;
        let activeChatUserId = null;
        let unsubscribeMessages = null;

        async function onAuthReady(user) {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUserId = user.uid;
            await loadConversations(currentUserId);

            const urlParams = new URLSearchParams(window.location.search);
            const conversationTargetId = urlParams.get('conversaCom') || urlParams.get('id') || urlParams.get('workerId');
            if (conversationTargetId) {
                const targetUserDoc = await db.collection('users').doc(conversationTargetId).get();
                if (targetUserDoc.exists) {
                    const targetUserData = targetUserDoc.data();
                    await openChat(conversationTargetId, targetUserData.name, targetUserData.photoURL);
                } else {
                    console.warn('Usuário alvo do chat não encontrado:', conversationTargetId);
                }
            }
        }

        async function loadConversations(userId) {
            const conversationsList = document.getElementById('conversations-list');
            try {
                const chatsSnapshot = await db.collection('chats')
                    .where('participantes', 'array-contains', userId)
                    .get();

                const otherUserIds = new Set();
                chatsSnapshot.forEach(doc => {
                    const participantes = doc.data().participantes || [];
                    participantes.forEach(id => { if (id !== userId) otherUserIds.add(id); });
                });

                const sp = new URLSearchParams(window.location.search);
                const urlUserId = sp.get('conversaCom') || sp.get('id') || sp.get('workerId');
                if (urlUserId) otherUserIds.add(urlUserId);

                if (otherUserIds.size === 0) {
                    conversationsList.innerHTML = '<p class="empty-text">Nenhuma conversa encontrada.</p>';
                    return;
                }

                conversationsList.innerHTML = '';
                for (const otherUserId of otherUserIds) {
                    const otherUserDoc = await db.collection('users').doc(otherUserId).get();
                    if (!otherUserDoc.exists) continue;

                    const userData = otherUserDoc.data();
                    const conversationItem = document.createElement('div');
                    conversationItem.className = 'conversation-item';
                    conversationItem.dataset.userId = otherUserId;
                    conversationItem.onclick = () => { openChat(otherUserId, userData.name, userData.photoURL); };
                    conversationItem.innerHTML = `
                        <img src="${userData.photoURL || 'https://i.imgur.com/TIGBwAm.jpg'}" alt="Foto de ${userData.name}" class="profile-pic">
                        <div class="conversation-info">
                            <p class="user-name">${userData.name}</p>
                            <p class="last-message">Clique para conversar</p>
                        </div>
                    `;
                    conversationsList.appendChild(conversationItem);
                }
            } catch (error) {
                console.error('Erro ao carregar conversas: ', error);
                conversationsList.innerHTML = '<p class="empty-text">Erro ao carregar conversas.</p>';
            }
        }

        async function openChat(targetUserId, targetUserName, targetUserPhoto) {
            if (activeChatUserId === targetUserId) return;
            activeChatUserId = targetUserId;

            document.getElementById('chat-welcome-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';

            const chatHeader = document.getElementById('chat-header');
            chatHeader.innerHTML = `
                <img src="${targetUserPhoto || 'https://i.imgur.com/TIGBwAm.jpg'}" alt="Foto de ${targetUserName}" class="profile-pic">
                <h3>${targetUserName}</h3>
                <a href="perfil.html?id=${targetUserId}" class="view-profile-btn">Ver Perfil</a>
            `;

            document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.conversation-item[data-user-id="${targetUserId}"]`);
            if (activeItem) activeItem.classList.add('active');

            const chatId = [currentUserId, targetUserId].sort().join('_');
            const messagesContainer = document.getElementById('messages-container');
            messagesContainer.innerHTML = '';

            if (unsubscribeMessages) unsubscribeMessages();

            try {
                await db.collection('chats').doc(chatId).set({
                    participantes: [currentUserId, targetUserId],
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } catch (error) {
                console.error('Erro ao iniciar conversa: ', error);
                messagesContainer.innerHTML = '<p>Não foi possível iniciar esta conversa.</p>';
                return;
            }

            unsubscribeMessages = db.collection('chats').doc(chatId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    messagesContainer.innerHTML = '';
                    snapshot.forEach(doc => {
                        const message = doc.data();
                        const messageElement = document.createElement('div');
                        messageElement.className = `message ${message.senderId === currentUserId ? 'sent' : 'received'}`;
                        messageElement.textContent = message.text || '';
                        messagesContainer.appendChild(messageElement);
                    });
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, error => {
                    console.error('Erro ao carregar mensagens: ', error);
                    messagesContainer.innerHTML = '<p>Erro ao carregar mensagens.</p>';
                });
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !activeChatUserId || !currentUserId) return;

            const chatId = [currentUserId, activeChatUserId].sort().join('_');
            const message = {
                type: 'text',
                text,
                senderId: currentUserId,
                receiverId: activeChatUserId,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection('chats').doc(chatId).collection('messages').add(message);
            await db.collection('chats').doc(chatId).set({
                participantes: [currentUserId, activeChatUserId],
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            input.value = '';
            input.focus();
            await loadConversations(currentUserId);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('send-button').addEventListener('click', sendMessage);
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>

</body>
</html>
