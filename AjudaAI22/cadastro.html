
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="css/custom-toast.css"> <!-- CSS do Toast -->
    <link rel="icon" href="image-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-card">
        <div class="header">
            <a href="index.html" class="logo"><img src="image-removebg-preview.png" alt=""></a>
            <h2>Crie sua conta</h2>
            <p>É rápido e fácil.</p>
        </div>

        <form id="cadastroForm">
            <!-- Seus campos de formulário aqui -->
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required>
            </div>
             <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required>
            </div>
            <div class="form-group">
                <label>Tipo de Usuário</label>
                <div class="type-selector">
                    <button type="button" id="btn-ajudar" class="type-option active">Quero Ajudar</button>
                    <button type="button" id="btn-contratar" class="type-option">Quero Contratar</button>
                </div>
            </div>

            <!-- Campos adicionais -->
            <div id="additional-fields"></div>
            
            <button type="submit" class="btn-submit">Cadastrar</button>
        </form>

        <div class="footer">
            Já tem uma conta? <a href="login.html">Faça login</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/custom-toast.js"></script> <!-- JS do Toast -->
    <script src="js/auth.js"></script>
    <script src="js/cadastro.js"></script>
    <script src="js/ai-chat.js"></script>

</body>
</html>
