
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Profissionais - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/busca.css">
    <link rel="icon" href="image-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo"> <img src="image-removebg-preview.png" alt="Logo AjudaAí"> <h1>AjudaAI</h1> </a>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Quem somos?</a></li>
                <li><a href="busca.html">Profissionais</a></li>
                <li><a href="chat.html">Chats</a></li>
            </ul>
        </nav>
        <div class="header-actions" id="header-actions">
            <!-- Botões de login/cadastro ou dashboard/sair serão inseridos aqui pelo auth-check.js -->
        </div>
    </header>

    <div class="search-container">
         <div class="filter-container">
             <div class="filter-header">
                 <i class="fas fa-search filter-icon"></i>
                 <input type="text" id="search-input" class="filter-main-input" placeholder="Busque por nome, profissão, serviço...">
                 <button id="search-button" class="btn-primary">Buscar</button>
             </div>
             <div class="filter-tags" id="category-filters">
                 <span class="tag-label">Categorias:</span>
                 <div class="category-tag active" data-category="all">Todos</div>
             </div>
         </div>

        <div id="no-results" style="display: none;"><p>Nenhum profissional encontrado.</p></div>
        <div id="loading-state"><p>Carregando profissionais...</p></div>
        <div class="results-grid" id="results-grid"></div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-check.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = firebase.firestore();
            const resultsGrid = document.getElementById('results-grid');
            const noResults = document.getElementById('no-results');
            const searchInput = document.getElementById('search-input');
            const categoryFilters = document.getElementById('category-filters');
            const loadingState = document.getElementById('loading-state');
            let workers = [];

            db.collection('users').where('userType', '==', 'trabalhador').get().then(snapshot => {
                const categories = new Set();
                if (snapshot.empty) {
                    loadingState.style.display = 'none';
                    noResults.style.display = 'block';
                    return;
                }

                snapshot.forEach(doc => {
                    const worker = { id: doc.id, ...doc.data() };
                    workers.push(worker);
                    if (worker.profession) categories.add(worker.profession);
                });
                
                loadingState.style.display = 'none';
                renderWorkers(workers);
                populateCategories(categories);

            }).catch(error => {
                console.error("Erro ao buscar profissionais: ", error);
                loadingState.innerHTML = "<p style='color:red;'>Ocorreu um erro ao carregar.</p>";
            });

            function populateCategories(categories) {
                 categories.forEach(cat => {
                    const tag = document.createElement('div');
                    tag.className = 'category-tag';
                    tag.dataset.category = cat;
                    tag.textContent = cat;
                    categoryFilters.appendChild(tag);
                });
            }

            function renderWorkers(workersToRender) {
                resultsGrid.innerHTML = '';
                noResults.style.display = workersToRender.length === 0 ? 'block' : 'none';

                workersToRender.forEach(worker => {
                    const photoSrc = worker.photoURL || 'https://i.imgur.com/TIGBwAm.jpg';
                    const card = document.createElement('div');
                    card.className = 'worker-card';

                    card.innerHTML = `
                        <a href="perfil.html?id=${worker.id}" class="card-link">
                            <div class="worker-pic-wrapper">
                                <img src="${photoSrc}" alt="Foto de ${worker.name}" class="worker-pic">
                            </div>
                            <div class="worker-info">
                                <h3>${worker.name || 'Nome não informado'}</h3>
                                <span class="profession">${worker.profession || 'Sem categoria'}</span>
                                <div class="worker-details">
                                    <div class="detail-item">
                                        <i class="fas fa-star icon"></i>
                                        <span>${worker.avgRating ? Number(worker.avgRating).toFixed(1) : 'N/A'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <i class="fas fa-map-marker-alt icon"></i>
                                        <span>${worker.cep || 'Não informado'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <i class="fas fa-dollar-sign icon"></i>
                                        <span>${(worker.priceMin && worker.priceMax) ? `R$${worker.priceMin} - R$${worker.priceMax}` : 'Preço não definido'}</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                    resultsGrid.appendChild(card);
                });
            }

            function filterAndRender() {
                const searchTerm = searchInput.value.toLowerCase().trim();
                const activeCategory = document.querySelector('.category-tag.active').dataset.category;

                let filteredWorkers = workers.filter(w => {
                    const nameMatch = (w.name || '').toLowerCase().includes(searchTerm);
                    const professionMatch = (w.profession || '').toLowerCase().includes(searchTerm);
                    const categoryMatch = (activeCategory === 'all' || w.profession === activeCategory);
                    
                    return (nameMatch || professionMatch) && categoryMatch;
                });

                renderWorkers(filteredWorkers);
            }

            document.getElementById('search-button').addEventListener('click', filterAndRender);
            searchInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') filterAndRender(); });

            categoryFilters.addEventListener('click', (e) => {
                if (e.target.classList.contains('category-tag')) {
                    categoryFilters.querySelector('.active').classList.remove('active');
                    e.target.classList.add('active');
                    filterAndRender();
                }
            });
        });
    </script>
    <script src="js/ai-chat.js"></script>
</body>
</html>
