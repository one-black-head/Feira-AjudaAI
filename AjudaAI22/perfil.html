
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuário - AjudaAí</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="icon" href="image-removebg-preview.png" type="image/png">
</head>
<body>
    <header>
        <a href="index.html" class="logo"> <img src="image-removebg-preview.png" alt="Logo AjudaAí"> <h1>AjudaAI</h1> </a>
        <nav> <ul> <li><a href="index.html">Início</a></li> <li><a href="sobre.html">Quem somos?</a></li> <li><a href="busca.html">Profissionais</a></li> <li><a href="chat.html">Chat</a></li> </ul> </nav>
        <div class="header-actions" id="header-actions"></div>
    </header>

    <main>
        <div id="loading-state" class="loading-card">Carregando perfil...</div>

        <div class="profile-container" id="profile-view" style="display: none;">
            <!-- Coluna da Esquerda -->
            <aside class="profile-sidebar">
                <div class="profile-main-card animate-on-scroll">
                    <div class="profile-pic-container">
                        <img src="https://i.imgur.com/TIGBwAm.jpg" alt="Foto do Perfil" id="profile-pic" class="profile-pic">
                    </div>
                    <h1 id="user-name"></h1>
                    <p id="user-profession"></p>
                    <div id="user-rating" class="avg-rating" style="display: none;">
                        <span id="rating-stars" class="stars"></span>
                        <span id="rating-value"></span>
                    </div>
                    <div id="profile-owner-actions" class="actions-group"></div>
                </div>

                <div class="profile-contact-card animate-on-scroll">
                    <h3>Informações de Contato</h3>
                    <div class="info-grid">
                        <div class="info-item"> <strong>Email:</strong> <span id="user-email"></span> </div>
                        <div class="info-item"> <strong>WhatsApp:</strong> <span id="user-phone"></span> </div>
                        <div class="info-item"> <strong>Localização:</strong> <span id="user-address"></span> </div>
                        <div class="info-item" id="user-price-range" style="display: none;"> <strong>Faixa de Preço:</strong> <span id="price-range-value"></span> </div>
                    </div>
                </div>
            </aside>

            <!-- Coluna da Direita -->
            <div class="profile-content">
                <div class="profile-card animate-on-scroll" id="about-card">
                    <div class="section-header"> <h3>Sobre Mim</h3> </div>
                    <p id="user-summary"></p>
                </div>

                <div class="profile-card animate-on-scroll" id="portfolio-section" style="display: none;">
                    <div class="section-header">
                        <h3>Portfólio</h3>
                        <a href="portfolio.html" class="btn btn-outline" id="manage-portfolio-btn" style="display: none;">Gerenciar</a>
                    </div>
                    <div id="portfolio-grid" class="portfolio-grid-view"></div>
                    <p id="portfolio-empty-msg" style="display:none;">Nenhum item no portfólio ainda.</p>
                </div>

                <div class="profile-card animate-on-scroll" id="reviews-section">
                    <div class="section-header"> <h3>Avaliações Recebidas</h3> </div>
                    <div id="reviews-list"></div>
                    <p id="reviews-empty-msg" style="display:none;">Nenhuma avaliação recebida ainda.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-check.js"></script>
    <script src="js/perfil-script.js"></script>
    <script src="js/animations.js"></script> 
    <script src="js/ai-chat.js"></script>
</body>
</html>
