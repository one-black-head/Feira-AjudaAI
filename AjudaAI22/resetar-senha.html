
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="css/custom-toast.css">
</head>
<body>
    <div class="auth-card">
        <div class="header">
            <a href="index.html" class="logo"><img src="image-removebg-preview.png" alt=""></a>
            <h2>Recupere sua senha</h2>
            <p>Informe seu e-mail para receber o link de recuperação.</p>
        </div>


        <form id="resetForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="btn-submit">Enviar Link de Recuperação</button>
        </form>

        <div class="footer">
            Lembrou da senha? <a href="login.html">Faça Login</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/custom-toast.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
