
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AjudaAí</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="stylesheet" href="css/custom-toast.css"> <!-- CSS do Toast -->
    <link rel="icon" href="image-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-card">
        <div class="header">
            <a href="index.html" class="logo"><img src="image-removebg-preview.png" alt=""></a>
            <h2>Bem-vindo de volta!</h2>
            <p>Faça login para continuar.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required>
            </div>
            <div class="form-group-extra">
                <a href="resetar-senha.html">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="btn-submit">Entrar</button>
        </form>

        <div class="footer">
            Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script> <!-- Adicionado -->
    <script src="js/firebase-config.js"></script>
    <script src="js/custom-toast.js"></script> <!-- JS do Toast -->
    <script src="js/auth.js"></script>
    <script src="js/ai-chat.js"></script>
</body>
</html>
